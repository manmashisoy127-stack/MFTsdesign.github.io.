  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<div style="background-color: #f4f0ea; padding: 25px 0; text-align: center; margin-bottom: 20px; position: relative;">
    <style>
        .my-nav-link { 
            font-size: 22px; 
            margin: 0 10px; 
            text-decoration: none; 
            font-weight: bold; 
            font-family: sans-serif; 
            color: #007bff; 
            display: inline-block; 
            vertical-align: middle; 
        }
        
        /* THE CORNER DROP BUTTON CONTAINER */
        .dropdown { 
            position: absolute; 
            right: 15px; 
            top: 50%;
            transform: translateY(-50%);
            display: inline-block;
        }
        
        /* MASSIVE THREE DOTS CLICK LAYER */
        .dropbtn { 
            font-size: 38px; 
            font-weight: bold;
            background: none; 
            border: none; 
            color: #007bff; 
            cursor: pointer; 
            padding: 10px 20px; 
            line-height: 1;
        }
        
        /* ENLARGED WHITE POPUP BOX WINDOW */
        .dropdown-content { 
            display: none; 
            position: absolute; 
            right: 0; 
            background-color: #ffffff; 
            width: 70vw; /* Takes up 70% of the mobile screen width */
            max-width: 300px;
            box-shadow: 0px 12px 28px rgba(0,0,0,0.4); 
            z-index: 99999; 
            border-radius: 14px; 
            text-align: left; 
            margin-top: 12px; 
            padding: 10px 0;
        }
        
        /* MASSIVE, TAPPABLE SYSTEM LINKS */
        .dropdown-content a { 
            color: #333333; 
            padding: 22px 24px; /* Huge touch area for thumbs */
            text-decoration: none; 
            display: block; 
            font-family: sans-serif; 
            font-weight: bold; 
            font-size: 24px; /* Explicit giant size */
            border-bottom: 1px solid #eeeeee;
        }
        .dropdown-content a:last-child { border-bottom: none; }
        .dropdown-content a:active { background-color: #f4f0ea; color: #007bff; }
        
        /* Keeps drop visible on click or focus actions */
        .dropdown:hover .dropdown-content, .dropdown:focus-within .dropdown-content { display: block; }
    </style>
